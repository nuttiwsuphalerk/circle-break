<script>
/* ==========================================================================
   Game: Race Engine — one shared requestAnimationFrame loop that drives
   Running Race, Duck Race and Car Race. Only the sprite emoji, lane
   flavor text and named events change between themes; the movement and
   fairness logic (everyone starts together, per-frame randomness is
   identical in distribution for every racer) is identical for all three.

   Elimination mode (gear button): the racer who finishes 1st is removed
   from the pool before the next race, so repeated races crown a new
   winner each time instead of the same person over and over.
   Round time limit (gear button): sets the target pace for the whole
   race — racers move slower for a longer limit, faster for a shorter
   one — so the field genuinely finishes around the configured time,
   with the limit itself still acting as a hard cutoff for any straggler
   an unlucky event has slowed down too much.
   ========================================================================== */
(function registerRaceGames() {
  const THEMES = {
    'running-race': {
      title: 'Running Race',
      get tagline() { return I18n.t('race.runningTagline'); },
      sprite: () => '🏃',
      laneBg: '',
      events: [
        { label: 'Speed Boost', icon: '⚡', mult: 1.9, duration: 700 },
        { label: 'Sprint', icon: '💨', mult: 1.6, duration: 900 },
        { label: 'Dash', icon: '🌟', mult: 1.75, duration: 550 },
        { label: 'Trip', icon: '💥', mult: 0.35, duration: 650 },
        { label: 'Slip', icon: '🍌', mult: 0.4, duration: 600 },
        { label: 'Slow', icon: '🐌', mult: 0.55, duration: 700 },
      ]
    },
    'duck-race': {
      title: 'Duck Race',
      get tagline() { return I18n.t('race.duckTagline'); },
      sprite: () => '🦆',
      laneBg: 'linear-gradient(180deg, transparent 0%, rgba(76,217,192,.08) 100%)',
      events: [
        { label: 'Speed Boost', icon: '💦', mult: 1.8, duration: 700 },
        { label: 'Sprint', icon: '🌊', mult: 1.55, duration: 800 },
        { label: 'Splash', icon: '💥', mult: 0.4, duration: 600 },
        { label: 'Slip', icon: '🫧', mult: 0.5, duration: 600 },
        { label: 'Tangled Weeds', icon: '🌿', mult: 0.35, duration: 700 },
      ]
    },
    'car-race': {
      title: 'Car Race',
      get tagline() { return I18n.t('race.carTagline'); },
      sprite: (i) => '🚗',
      laneBg: 'repeating-linear-gradient(90deg, transparent 0 24px, rgba(241,238,251,.06) 24px 26px)',
      events: [
        { label: 'Nitro', icon: '🔥', mult: 2.0, duration: 650 },
        { label: 'Turbo', icon: '⚡', mult: 1.7, duration: 750 },
        { label: 'Drift', icon: '💨', mult: 1.3, duration: 500 },
        { label: 'Engine Fail', icon: '🛠', mult: 0.3, duration: 800 },
        { label: 'Random Speed', icon: '🎲', mult: () => Utils.randomRange(0.6, 1.6), duration: 500 },
      ]
    }
  };

  function buildGame(themeId) {
    const theme = THEMES[themeId];
    let rafId = null;
    let running = false;
    let eliminationOn = false;
    let pickedList = []; // past winners, in win order
    let timerOn = false;
    let timerSeconds = 25;
    let timerIntervalId = null;
    let unsubscribePlayers = null;
    const HUES = [0, 40, 80, 160, 200, 260, 300, 330];

    function pool() {
      const all = PlayerStore.getAll();
      pickedList = pickedList.filter(n => all.includes(n));
      const picked = new Set(pickedList);
      return all.filter(n => !picked.has(n));
    }

    function activePlayers() {
      return eliminationOn ? pool() : PlayerStore.getAll();
    }

    function clearTimerInterval() {
      if (timerIntervalId) { clearInterval(timerIntervalId); timerIntervalId = null; }
    }

    function openGearSettings(container) {
      GameSettingsUtil.openModal({
        title: theme.title,
        elimination: {
          label: I18n.t('race.eliminationLabel'),
          on: eliminationOn,
          eliminatedList: pickedList,
          eliminatedListLabel: I18n.t('common.alreadyWon'),
          onToggle: (next) => { eliminationOn = next; if (next) pickedList = []; buildStage(container); }
        },
        timer: {
          label: I18n.t('race.timerLabel'),
          on: timerOn,
          seconds: timerSeconds,
          onToggle: (next) => { timerOn = next; buildStage(container); },
          onSeconds: (v) => { timerSeconds = v; buildStage(container); }
        }
      });
    }

    function buildStage(container) {
      running = false;
      const players = activePlayers();

      if (eliminationOn && players.length < 2) {
        const doneMsg = players.length === 1
          ? I18n.t('race.lastOneLeft', { name: Utils.escapeHtml(players[0]) })
          : I18n.t('common.allDone');
        container.innerHTML = `
          <section class="glass game-stage">
            <div class="winner-name">${doneMsg}</div>
            ${eliminatedPanelHtml(pickedList, I18n.t('common.winnerOrderAll'))}
            <div class="btn-row" style="justify-content:center">
              <button class="btn" id="raceResetElimBtn">${I18n.t('common.restartAll')}</button>
            </div>
          </section>`;
        GameSettingsUtil.attachGearButton(container.querySelector('.game-stage'), () => openGearSettings(container));
        container.querySelector('#raceResetElimBtn').addEventListener('click', () => { pickedList = []; buildStage(container); });
        return;
      }

      container.innerHTML = `
        <section class="glass game-stage" style="text-align:left">
          ${timerOn ? '<div class="timer-badge" id="raceTimerBadge" style="display:block; margin:0 auto 6px">⏱ ' + timerSeconds + 's</div>' : ''}
          <div class="race-track" id="raceTrack">
            ${players.map((name, i) => `
              <div class="race-lane" style="background:${theme.laneBg}">
                <span class="lane-name">${Utils.escapeHtml(name)}</span>
                <span class="race-event-badge" id="badge-${i}"></span>
                <span class="sprite" id="sprite-${i}" style="left:0%; filter:hue-rotate(${HUES[i % HUES.length]}deg)">${theme.sprite(i)}</span>
              </div>`).join('')}
            <div class="finish-line"></div>
          </div>
          ${eliminationOn ? eliminatedPanelHtml(pickedList, I18n.t('common.alreadyWon')) : ''}
          <div class="btn-row" style="justify-content:center">
            <button class="btn" id="raceStartBtn">${I18n.t('race.startBtn')}</button>
          </div>
          <div id="raceResult" style="margin-top:10px; text-align:center"></div>
        </section>`;

      GameSettingsUtil.attachGearButton(container.querySelector('.game-stage'), () => openGearSettings(container));
      container.querySelector('#raceStartBtn').addEventListener('click', () => startCountdown(container, players));
    }

    function mount(container) {
      eliminationOn = false;
      pickedList = [];
      timerOn = false;
      clearTimerInterval();
      buildStage(container);
      // The lane list is built from the roster at buildStage() time, so
      // a player added while everyone's just standing at the starting
      // line (race not yet running) needs to trigger a rebuild too.
      if (unsubscribePlayers) unsubscribePlayers();
      unsubscribePlayers = PlayerStore.onChange(() => {
        if (!running) buildStage(container);
      });
    }

    function startCountdown(container, players) {
      const btn = container.querySelector('#raceStartBtn');
      btn.disabled = true;
      let count = 3;
      const track = container.querySelector('#raceTrack');
      const overlay = document.createElement('div');
      overlay.className = 'winner-name';
      overlay.style.margin = '8px 0';
      overlay.textContent = String(count);
      track.parentNode.insertBefore(overlay, track);
      SoundManager.play('countdown');
      const timer = setInterval(() => {
        count -= 1;
        if (count > 0) {
          overlay.textContent = String(count);
          SoundManager.play('countdown');
        } else {
          overlay.textContent = I18n.t('race.go');
          SoundManager.play('race');
          clearInterval(timer);
          setTimeout(() => { overlay.remove(); runRace(container, players); }, 400);
        }
      }, AnimationSetting.isEnabled() ? 600 : 20);
    }

    function runRace(container, players) {
      running = true;
      const n = players.length;
      const state = players.map(() => ({ pos: 0, mult: 1, effectUntil: 0, finished: false, finishOrder: null }));
      let finishedCount = 0;
      let lastTime = performance.now();
      let lastTickSound = 0;
      const raceStart = performance.now();
      const timeLimitMs = timerOn ? timerSeconds * 1000 : Infinity;
      // When a round time limit is set, the pace itself must target that
      // duration — otherwise racers always cross the line in ~5s (their
      // natural pace at the default speed) no matter what limit is set,
      // and the "limit" never does anything but sit unused. 0.82 leaves
      // headroom so most racers finish a bit before the hard cutoff,
      // which still exists as a safety net for unlucky, event-slowed racers.
      const DEFAULT_BASE_SPEED = 21; // ~4.8s to finish, used when no limit is set
      const baseSpeed = timerOn ? Utils.clamp(100 / (timerSeconds * 0.82), 1.5, 60) : DEFAULT_BASE_SPEED;

      clearTimerInterval();
      if (timerOn) {
        const badge = container.querySelector('#raceTimerBadge');
        const updateBadge = () => {
          const remain = Math.max(0, Math.ceil((timeLimitMs - (performance.now() - raceStart)) / 1000));
          if (badge) badge.textContent = `⏱ ${remain}s`;
        };
        updateBadge();
        timerIntervalId = setInterval(updateBadge, 500);
      }

      function forceFinishRemaining(now) {
        const unfinished = [];
        for (let i = 0; i < n; i++) if (!state[i].finished) unfinished.push(i);
        // Whoever is furthest along when time runs out is ranked highest among the rest.
        unfinished.sort((a, b) => state[b].pos - state[a].pos);
        unfinished.forEach(i => {
          state[i].finished = true;
          finishedCount += 1;
          state[i].finishOrder = finishedCount;
        });
      }

      function frame(now) {
        if (!running) return;
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        for (let i = 0; i < n; i++) {
          const s = state[i];
          if (s.finished) continue;

          if (now > s.effectUntil) { s.mult = 1; }

          if (now > s.effectUntil && Math.random() < 0.01) {
            const ev = theme.events[Utils.randomIndex(theme.events.length)];
            const mult = typeof ev.mult === 'function' ? ev.mult() : ev.mult;
            s.mult = mult;
            s.effectUntil = now + ev.duration;
            const badge = container.querySelector(`#badge-${i}`);
            if (badge) {
              badge.textContent = `${ev.icon} ${ev.label}`;
              badge.style.left = '4px';
              badge.style.opacity = '1';
              setTimeout(() => { badge.style.opacity = '0'; }, ev.duration);
            }
          }

          const jitter = Utils.randomRange(0.7, 1.3);
          s.pos += baseSpeed * jitter * s.mult * dt;

          if (s.pos >= 100 && !s.finished) {
            s.pos = 100;
            s.finished = true;
            finishedCount += 1;
            s.finishOrder = finishedCount;
          }

          const sprite = container.querySelector(`#sprite-${i}`);
          if (sprite) sprite.style.left = (s.pos * 0.9).toFixed(2) + '%';
        }

        if (now - lastTickSound > 180) { lastTickSound = now; SoundManager.play('race'); }

        if (finishedCount < n && (now - raceStart) >= timeLimitMs) {
          forceFinishRemaining(now);
        }

        if (finishedCount >= n) {
          running = false;
          clearTimerInterval();
          finishRace(container, players, state);
          return;
        }
        rafId = requestAnimationFrame(frame);
      }
      rafId = requestAnimationFrame(frame);
    }

    function finishRace(container, players, state) {
      const ranked = players
        .map((name, i) => ({ name, order: state[i].finishOrder }))
        .sort((a, b) => a.order - b.order)
        .map(r => r.name);

      SoundManager.play('winner');
      WinnerFX.confettiBurst();
      if (eliminationOn) pickedList.push(ranked[0]);

      const resultEl = container.querySelector('#raceResult');
      const top3 = ranked.slice(0, 3);
      const medals = ['🥇', '🥈', '🥉'];
      resultEl.innerHTML = `
        <div class="shatter-wrap"><div class="winner-name">🏆 ${Utils.escapeHtml(ranked[0])}</div></div>
        <div style="margin:10px 0; color:var(--text-dim)">
          ${top3.map((n, i) => `${medals[i]} ${Utils.escapeHtml(n)}`).join(' &nbsp; ')}
        </div>
        <div class="btn-row" style="justify-content:center">
          <button class="btn" id="raceAgainBtn">🔁 Play Again</button>
          <button class="btn secondary" id="raceShareBtn">📤 Share Result</button>
        </div>`;
      WinnerFX.shatterBurst(resultEl.querySelector('.shatter-wrap'));
      resultEl.querySelector('#raceAgainBtn').addEventListener('click', () => buildStage(container));
      resultEl.querySelector('#raceShareBtn').addEventListener('click', () => ShareResult.open(theme.title, ranked));
    }

    return {
      title: theme.title,
      tagline: theme.tagline,
      mount,
      unmount() { running = false; if (rafId) cancelAnimationFrame(rafId); rafId = null; clearTimerInterval(); if (unsubscribePlayers) { unsubscribePlayers(); unsubscribePlayers = null; } }
    };
  }

  Object.keys(THEMES).forEach(id => GameManager.register(id, buildGame(id)));
})();
</script>
